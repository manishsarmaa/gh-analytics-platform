# =============================================================================
# Databricks Asset Bundle — GH Analytics Platform
#
# Bundle root is the repo root so notebooks (src/notebooks) can import the
# shared modules (src/transformations, src/dq, src/utils) that get synced
# alongside them. Deploy with:
#
#   export DATABRICKS_HOST=... DATABRICKS_TOKEN=$(az keyvault secret show ...)
#   databricks bundle validate -t dev
#   databricks bundle deploy   -t dev
#
# Jobs (streaming, optimize) are added in later phases as their notebooks land.
# =============================================================================
bundle:
  name: gh-analytics-platform

# Only sync what the workspace needs (keeps the deployed bundle lean).
sync:
  paths:
    - ./src
    - ./configs

variables:
  catalog:
    description: Unity Catalog for this environment.
    default: gh_analytics_dev
  cluster_policy_id:
    description: Policy that enforces single-node/spot/auto-terminate cost controls.
    default: "00195EEF89A45D23"
  notification_email:
    description: Alert target for job failures.
    default: dbdaproject787@gmail.com

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405608693609813.13.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: gh_analytics_dev

  prod:
    mode: production
    workspace:
      host: https://adb-7405608693609813.13.azuredatabricks.net
      root_path: /Workspace/gh-analytics/${bundle.name}/${bundle.target}
    variables:
      catalog: gh_analytics_prod
      # NOTE: prod points at the same workspace for the trial; split later.

resources:
  jobs:
    # The medallion batch as one serverless multi-task job. ADF triggers this
    # via the Jobs API (run-now) and monitors it. Task DAG:
    #   bronze -> silver -> (gold, dq_silver); gold -> dq_gold; bronze -> dq_bronze
    gh_medallion_batch:
      name: "[${bundle.target}] gh-medallion-batch"
      tags:
        project: gh-analytics-platform
      queue:
        enabled: true    # queue instead of failing if a run is already active
      # Allow parallel backfill runs. Task retries below absorb the Delta
      # optimistic-concurrency conflicts that same-day parallel runs cause.
      max_concurrent_runs: 5
      parameters:
        - name: env
          default: dev
        - name: execution_date
          default: ""
        - name: landing_path
          default: ""
        - name: source_file
          default: ""
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./src/notebooks/bronze_ingestion.py
            base_parameters:
              env: "{{job.parameters.env}}"
              execution_date: "{{job.parameters.execution_date}}"
              landing_path: "{{job.parameters.landing_path}}"
              source_file: "{{job.parameters.source_file}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

        - task_key: dq_bronze
          depends_on: [{ task_key: bronze }]
          notebook_task:
            notebook_path: ./src/notebooks/dq_checks.py
            base_parameters:
              env: "{{job.parameters.env}}"
              layer: bronze
              execution_date: "{{job.parameters.execution_date}}"
              run_id: "{{job.run_id}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

        - task_key: silver
          depends_on: [{ task_key: bronze }]
          notebook_task:
            notebook_path: ./src/notebooks/silver_transformation.py
            base_parameters:
              env: "{{job.parameters.env}}"
              execution_date: "{{job.parameters.execution_date}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

        - task_key: dq_silver
          depends_on: [{ task_key: silver }]
          notebook_task:
            notebook_path: ./src/notebooks/dq_checks.py
            base_parameters:
              env: "{{job.parameters.env}}"
              layer: silver
              execution_date: "{{job.parameters.execution_date}}"
              run_id: "{{job.run_id}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

        - task_key: gold
          depends_on: [{ task_key: silver }]
          notebook_task:
            notebook_path: ./src/notebooks/gold_aggregation.py
            base_parameters:
              env: "{{job.parameters.env}}"
              execution_date: "{{job.parameters.execution_date}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

        - task_key: dq_gold
          depends_on: [{ task_key: gold }]
          notebook_task:
            notebook_path: ./src/notebooks/dq_checks.py
            base_parameters:
              env: "{{job.parameters.env}}"
              layer: gold
              execution_date: "{{job.parameters.execution_date}}"
              run_id: "{{job.run_id}}"
          environment_key: default
          max_retries: 2
          min_retry_interval_millis: 20000

      # Serverless environment: our notebooks need pyyaml (not in the base image).
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml==6.0.2

    # Repo-metadata enrichment (GitHub API -> silver.repos_scd2). ADF triggers
    # this on a 6-hourly cadence (Phase 11).
    gh_repo_metadata_refresh:
      name: "[${bundle.target}] gh-repo-metadata-refresh"
      tags:
        project: gh-analytics-platform
      queue:
        enabled: true
      parameters:
        - name: env
          default: dev
        - name: batch_size
          default: "100"
      tasks:
        - task_key: fetch_metadata
          notebook_task:
            notebook_path: ./src/notebooks/fetch_repo_metadata.py
            base_parameters:
              env: "{{job.parameters.env}}"
              batch_size: "{{job.parameters.batch_size}}"
          environment_key: default
          max_retries: 1
          min_retry_interval_millis: 20000
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml==6.0.2
              - requests==2.32.3

    # Daily OPTIMIZE + ZORDER + VACUUM. ADF triggers on a daily cadence (Phase 11).
    gh_daily_maintenance:
      name: "[${bundle.target}] gh-daily-maintenance"
      tags:
        project: gh-analytics-platform
      queue:
        enabled: true
      parameters:
        - name: env
          default: dev
        - name: vacuum_retention_hours
          default: "168"
      tasks:
        - task_key: maintenance
          notebook_task:
            notebook_path: ./src/notebooks/delta_maintenance.py
            base_parameters:
              env: "{{job.parameters.env}}"
              vacuum_retention_hours: "{{job.parameters.vacuum_retention_hours}}"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml==6.0.2

    # Streaming: Event Hubs (Kafka endpoint) -> bronze.gh_events_stream -> silver.
    # A Databricks Workflow (NOT ADF). availableNow processes the backlog then
    # stops (cheap demo); switch trigger_mode=continuous30s for a live stream.
    gh_streaming_ingestion:
      name: "[${bundle.target}] gh-streaming-ingestion"
      tags:
        project: gh-analytics-platform
      parameters:
        - name: env
          default: dev
        - name: trigger_mode
          default: availableNow
      tasks:
        - task_key: stream
          notebook_task:
            notebook_path: ./src/notebooks/streaming_ingestion.py
            base_parameters:
              env: "{{job.parameters.env}}"
              trigger_mode: "{{job.parameters.trigger_mode}}"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml==6.0.2
