name: Deploy (dev)

# Deploys the Databricks Asset Bundle to dev on merge to main.
# ADF resources deploy via ADF Studio Git integration (publish), not here.
# Terraform is applied manually (see infra/terraform/README.md) — infra changes
# are deliberately not auto-applied.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "configs/**"
      - "databricks.yml"
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-bundle:
    name: Deploy DAB to dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev

      - name: Deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy -t dev
