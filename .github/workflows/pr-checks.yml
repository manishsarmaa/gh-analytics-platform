name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + unit/spark tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java (for local Spark tests)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest (unit + spark)
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest -m "unit or spark" -q

  iac-validate:
    name: Validate Terraform + ADF JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform fmt + validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate ADF JSON is well-formed
        run: |
          python - <<'PY'
          import json, pathlib, sys
          bad = []
          for p in pathlib.Path("adf").rglob("*.json"):
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  bad.append(f"{p}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("All ADF JSON files valid.")
          PY

  bundle-validate:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev
